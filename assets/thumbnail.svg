<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1932 828" width="1932" height="828">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#2C2C2E"/>
      <stop offset="100%" stop-color="#0D0D0F"/>
    </radialGradient>
    <radialGradient id="og" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FF8C40"/>
      <stop offset="100%" stop-color="#D94F00"/>
    </radialGradient>
    <radialGradient id="bl" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#7ED8FF"/>
      <stop offset="100%" stop-color="#1E9FD4"/>
    </radialGradient>
    <radialGradient id="gr" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#9AED5A"/>
      <stop offset="100%" stop-color="#3DAA0A"/>
    </radialGradient>
    <radialGradient id="ye" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#E09000"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <linearGradient id="divider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#FF6900" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#FF6900" stop-opacity="0.8"/>
      <stop offset="70%"  stop-color="#FF6900" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FF6900" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1932" height="828" fill="url(#bg)"/>

  <!-- 배경 장식: 큰 컬러 글로우 (분위기) -->
  <circle cx="200" cy="200" r="180" fill="#FF6900" opacity="0.08" filter="url(#glowSoft)"/>
  <circle cx="820" cy="680" r="160" fill="#3BB5E0" opacity="0.07" filter="url(#glowSoft)"/>

  <!-- ── 좌측 게임패드 (중앙 y=414, 중앙 x=430) ── -->
  <!-- 베이스 플레이트 -->
  <rect x="278" y="222" width="304" height="384" rx="48" fill="#1E1E20" opacity="0.8"/>
  <rect x="208" y="292" width="444" height="244" rx="48" fill="#1E1E20" opacity="0.8"/>

  <!-- 버튼 베젤 -->
  <circle cx="310" cy="310" r="148" fill="#141416"/>
  <circle cx="310" cy="310" r="130" fill="#222224"/>
  <circle cx="550" cy="310" r="148" fill="#141416"/>
  <circle cx="550" cy="310" r="130" fill="#222224"/>
  <circle cx="310" cy="518" r="148" fill="#141416"/>
  <circle cx="310" cy="518" r="130" fill="#222224"/>
  <circle cx="550" cy="518" r="148" fill="#141416"/>
  <circle cx="550" cy="518" r="130" fill="#222224"/>

  <!-- 버튼 글로우 -->
  <circle cx="310" cy="310" r="110" fill="#FF6900" opacity="0.30" filter="url(#glow)"/>
  <circle cx="550" cy="310" r="110" fill="#3BB5E0" opacity="0.28" filter="url(#glow)"/>
  <circle cx="310" cy="518" r="110" fill="#5ECC1B" opacity="0.24" filter="url(#glow)"/>
  <circle cx="550" cy="518" r="110" fill="#FFC200" opacity="0.28" filter="url(#glow)"/>

  <!-- 버튼 본체 -->
  <circle cx="310" cy="310" r="108" fill="url(#og)"/>
  <circle cx="550" cy="310" r="108" fill="url(#bl)"/>
  <circle cx="310" cy="518" r="108" fill="url(#gr)"/>
  <circle cx="550" cy="518" r="108" fill="url(#ye)"/>

  <!-- 버튼 하이라이트 -->
  <ellipse cx="290" cy="270" rx="44" ry="28" fill="white" opacity="0.28"/>
  <ellipse cx="530" cy="270" rx="44" ry="28" fill="white" opacity="0.28"/>
  <ellipse cx="290" cy="478" rx="44" ry="28" fill="white" opacity="0.28"/>
  <ellipse cx="530" cy="478" rx="44" ry="28" fill="white" opacity="0.28"/>

  <!-- 중앙 원 -->
  <circle cx="430" cy="414" r="72" fill="#141416"/>
  <circle cx="430" cy="414" r="60" fill="#1C1C1E"/>

  <!-- 구분선 -->
  <rect x="850" y="60" width="2" height="708" fill="url(#divider)"/>

  <!-- ── 우측 텍스트 영역 ── -->

  <!-- MEMORY BATTLE 영문 -->
  <text x="960" y="228"
        font-family="'Arial Black', 'Helvetica Neue', sans-serif"
        font-weight="900" font-size="28" letter-spacing="12"
        fill="#FF6900" opacity="0.90">MEMORY BATTLE</text>

  <!-- 기억력배틀 메인 타이틀 -->
  <text x="954" y="370"
        font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
        font-weight="900" font-size="140" letter-spacing="-2"
        fill="white">기억력</text>
  <text x="954" y="500"
        font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
        font-weight="900" font-size="140" letter-spacing="-2"
        fill="#FF6900">배틀</text>

  <!-- 태그라인 -->
  <text x="960" y="576"
        font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
        font-weight="400" font-size="34" letter-spacing="1"
        fill="#AAAAAA">당신의 기억력은 몇 단계까지 버틸 수 있을까?</text>

  <!-- 피처 칩 3개 -->
  <!-- 칩 1 -->
  <rect x="960" y="620" width="210" height="44" rx="22" fill="#FF6900" opacity="0.18"/>
  <rect x="960" y="620" width="210" height="44" rx="22" fill="none" stroke="#FF6900" stroke-width="1.5" opacity="0.5"/>
  <text x="1065" y="648" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', sans-serif"
        font-weight="600" font-size="20" fill="#FF8C40">4색 시퀀스 기억</text>

  <!-- 칩 2 -->
  <rect x="1190" y="620" width="196" height="44" rx="22" fill="#3BB5E0" opacity="0.15"/>
  <rect x="1190" y="620" width="196" height="44" rx="22" fill="none" stroke="#3BB5E0" stroke-width="1.5" opacity="0.5"/>
  <text x="1288" y="648" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', sans-serif"
        font-weight="600" font-size="20" fill="#7ED8FF">단계별 속도 증가</text>

  <!-- 칩 3 -->
  <rect x="1404" y="620" width="196" height="44" rx="22" fill="#5ECC1B" opacity="0.15"/>
  <rect x="1404" y="620" width="196" height="44" rx="22" fill="none" stroke="#5ECC1B" stroke-width="1.5" opacity="0.5"/>
  <text x="1502" y="648" text-anchor="middle"
        font-family="'Apple SD Gothic Neo', sans-serif"
        font-weight="600" font-size="20" fill="#9AED5A">일간·월간 랭킹</text>

  <!-- 하단 앱인토스 뱃지 -->
  <text x="960" y="758"
        font-family="'Apple SD Gothic Neo', sans-serif"
        font-weight="400" font-size="22" fill="#666666">앱인토스 미니앱</text>
</svg>
